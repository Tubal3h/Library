<th:block th:fragment="catalog">
    <!-- Icon-based Book Cards (No Image) -->
    <div
        th:each="book, iter : ${books}"
        class="book-card-horizontal glass radius-24 p-0 shadow-card flex border-none animate-card overflow-hidden"
        
        th:style="'--delay: ' + (${iter.index} * 0.1) + 's;'">
        
        <!-- Left Column: Information (75%) -->
        <div class="card-info-main flex-1 p-7 flex flex-column">
            <!-- Header: Category & Status Badge -->
        <div class="flex justify-between align-center mb-6 status-context" 
             th:classappend="${book.status == 'disponibilita' ? 'status-vibrant-active' : 'status-vibrant-pending'}">
            <span class="category-label font-mono font-size-xs uppercase fw-500 tracking-widest opacity-40" th:text="${book.categoryName}">CATEGORIA</span>
            <div class="glass-indicator radius-full px-3 py-1 font-size-xs fw-800 uppercase tracking-widest flex align-center gap-2 p-2">
                <span class="dot"></span>
                <span th:if="${book.status == 'disponibilita'}">Disponibile</span>
                <span th:if="${book.status != 'disponibilita'}">In Prestito</span>
            </div>
        </div>

            <!-- Middle: Title & Author -->
            <div class="mb-5">
                <h3 class="text-xl fw-700 text-brand mb-1" th:text="${book.title}"></h3>
                <p class="font-size-sm opacity-60" th:text="${book.authorFullName}"></p>
            </div>

            <!-- Meta: Icons Row -->
            <div class="card-meta mt-auto flex align-center gap-4 opacity-50">
                <div class="flex align-center gap-2 font-size-small" th:title="${book.publisherName}">
                    <i class="fa-solid fa-building-columns text-xs text-brand"></i>
                    <span th:text="${book.publisherName}" class="text-truncate" style="max-width: 80px;">Editore</span>
                </div>
                <div class="flex align-center gap-2 font-size-small">
                    <i class="fa-solid fa-calendar-check text-xs text-brand"></i>
                    <span th:text="${book.publishingDate}">Data</span>
                </div>
                <div class="flex align-center gap-2 font-size-small">
                    <i class="fa-solid fa-barcode text-xs text-brand"></i>
                    <span th:text="${book.isbnCode}" class="font-mono">ISBN</span>
                </div>
            </div>
        </div>

        <!-- Right Column: Action Section (110px) -->
        <div class="card-action-column p-5 flex flex-column justify-end align-end border-l">
            <button th:if="role_user == 'role_admin'" class="btn-modern-action pointer transition shadow-soft">
                <span>Restituisci</span>
                <i class="fa-solid fa-pen-to-square"></i>
            </button>
            <button th:if="role_user != 'role_admin'" class="btn-modern-action pointer transition shadow-soft">
                <span>Prenota</span>
                <i class="fa-solid fa-pen-to-square"></i>
            </button>
        </div>
    </div>
</th:block>
