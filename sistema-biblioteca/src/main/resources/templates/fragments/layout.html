<!DOCTYPE html>
<html th:fragment="master(titolo, contenuto)" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titolo} ?: 'Library | Sistema Biblioteca'"></title>
    
    <!-- Librerie esterne -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Stili Base -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
    
    <!-- Stili Frammenti (Layout, Navbar, Footer) -->
    <link rel="stylesheet" th:href="@{/css/fragments/layout.css}">
    <link rel="stylesheet" th:href="@{/css/fragments/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/fragments/catalog.css}">
    <link rel="stylesheet" th:href="@{/css/fragments/footer.css}">
</head>
<body data-theme="light">
    <!-- Background Glow Effect (similar to image) -->
    <div class="bg-glow"></div>

    <div class="app-container flex w-100 h-100vh overflow-hidden">
        <!-- Sidebar Navigation -->
        <header th:replace="~{fragments/navbar :: navbar}"></header>

        <!-- Main Content Area -->
        <main id="app-main" class="flex-1 overflow-y-auto p-relative animate-fade-in-up opacity-0 delay-1">
            <div th:replace="${contenuto}">
                Contenuto di fallback
            </div>
        </main>
    </div>

    <!-- Script Globali e Frammenti -->
    <script th:src="@{/js/fragments/layout.js}"></script>
    <script th:src="@{/js/fragments/navbar.js}"></script>
    <script th:src="@{/js/fragments/catalog.js}"></script>
    <script th:src="@{/js/fragments/footer.js}"></script>
</body>
</html>
