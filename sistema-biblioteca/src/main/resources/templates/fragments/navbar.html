<!-- fragment navbar -->
<nav th:fragment="navbar" id="sidebar" class="glass radius-32 flex flex-column shadow-soft animate-slide-in-left opacity-0 p-3">
    <!-- Top: Logo -->
    <div class="sidebar-header flex align-center justify-center pt-3">
        <a th:href="@{/dashboard(email=${user.userEmail}, section='home')}" class="sidebar-logo flex align-center justify-center radius-12">
            <img th:src="@{/img/logo_mba.svg}" alt="MBA Logo" class="sidebar-img">
        </a>
    </div>

    <!-- Middle: Main Links -->
    <div class="sidebar-content flex-1 p-2 overflow-y-auto">
        <div class="nav-group mb-3">
            <span class="nav-label font-size-small uppercase fw-700 opacity-50 px-2 mb-2 block">Menu</span>
            
            <a th:href="@{/dashboard(email=${user.userEmail}, section='home')}" 
               class="sidebar-link flex align-center gap-2 p-2 radius-12"
               th:classappend="${section == 'home' ? 'active' : ''}">
                <i class="fa-solid fa-house"></i>
                <span class="fw-600">Dashboard</span>
            </a>

            <a th:href="@{/dashboard(email=${user.userEmail}, section='catalog')}" 
               class="sidebar-link flex align-center gap-2 p-2 radius-12"
               th:classappend="${section == 'catalog' ? 'active' : ''}">
                <i class="fa-solid fa-list-ul"></i>
                <span class="fw-600">Catalogo</span>
            </a>

            <!-- User specific links -->
            <a th:if="${user.userRole == 'role_user'}" 
               th:href="@{/dashboard(email=${user.userEmail}, section='rents')}" 
               class="sidebar-link flex align-center gap-2 p-2 radius-12"
               th:classappend="${section == 'rents' ? 'active' : ''}">
                <i class="fa-solid fa-clock-rotate-left"></i>
                <span class="fw-600">Prestiti</span>
            </a>

            <a th:if="${user.userRole == 'role_admin'}" 
               th:href="@{/dashboard(email=${user.userEmail}, section='users')}" 
               class="sidebar-link flex align-center gap-2 p-2 radius-12"
               th:classappend="${section == 'users' ? 'active' : ''}">
                <i class="fa-solid fa-users"></i>
                <span class="fw-600">Utenti</span>
            </a>
        </div>
    </div>

    <!-- Bottom: Theme & Logout -->
    <div class="sidebar-footer p-2 border-t mt-auto flex flex-column gap-2">
        <!-- Theme Toggle -->
        <div class="theme-switch-container flex align-center justify-center p-2 radius-12 glass">
            <label class="switch">
                <input type="checkbox" id="theme-toggle">
                <span class="slider round"></span>
            </label>
        </div>

        <div class="footer-links flex flex-column gap-1">
            <form th:if="${user != null}" th:action="@{/api/logout}" method="post" class="m-0">
                <button type="submit" class="sidebar-link-sm flex align-center w-100 gap-2 p-2 radius-12 border-none bg-transparent cursor-pointer opacity-100">
                    <i class="fa-solid fa-right-from-bracket text-sm"></i>
                    <span class="fw-600 text-sm">Logout</span>
                </button>
            </form>
        </div>
    </div>
</nav>
